<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .stroke {
      fill: none;
      stroke: #111827;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @media (prefers-color-scheme: dark) {
      .stroke {
        stroke: #ffffff;
      }
    }
  </style>
  <!-- Calendar -->
  <rect x="7" y="8" width="18" height="18" rx="4" class="stroke" />
  <path d="M7 12h18" class="stroke" />

  <!-- Clock + confirmation check -->
  <circle cx="16" cy="19" r="4.2" class="stroke" />
  <path d="M14.5 19.2l1.2 1.2l2.7-2.8" class="stroke" />
  <path d="M16 19v-2.1" class="stroke" />
</svg>